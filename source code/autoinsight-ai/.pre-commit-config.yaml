# =============================================================================
# AutoInsight AI — Pre-commit Hooks (Phase 5, Day 48)
# =============================================================================
# Install: pip install pre-commit && pre-commit install
# Run: pre-commit run --all-files
# =============================================================================

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-docstring-first
      - id: name-tests-test
        args: [--pytest-test-first]

  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        args: [--line-length=100]
        language_version: python3.11

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --ignore=E203,W503,W504]
        additional_dependencies: [flake8-docstrings]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --warn-unused-configs]
        additional_dependencies: [pydantic, types-requests]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, typescript, tsx, json, css, markdown, yaml]
        args: [--print-width=100, --trailing-comma=all]
        additional_dependencies:
          - prettier@3.1.0

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        types_or: [javascript, jsx, typescript, tsx]
        args: [--fix]
        additional_dependencies:
          - eslint@8.56.0
          - @typescript-eslint/eslint-plugin@6.19.0
          - @typescript-eslint/parser@6.19.0
          - eslint-config-next@14.1.0
