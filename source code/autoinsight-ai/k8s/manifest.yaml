# =============================================================================
# AutoInsight AI — Kubernetes Deployment Manifests (Phase 5, Day 49)
# =============================================================================
# Apply: kubectl apply -f k8s/
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: autoinsight
  labels:
    app: autoinsight
    environment: production
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: autoinsight-config
  namespace: autoinsight
data:
  APP_NAME: "AutoInsight AI"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  LOG_LEVEL: "WARNING"
  LLM_PROVIDER: "groq"
  GROQ_MODEL: "qwen-2.5-72b"
  OLLAMA_MODEL: "llama3.1:8b"
  MAX_FILE_SIZE_MB: "100"
  PIPELINE_TIMEOUT_SECONDS: "300"
  CORS_ORIGINS: "https://autoinsight.example.com"
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET: "autoinsight-files"
  S3_REGION: "us-east-1"
---
apiVersion: v1
kind: Secret
metadata:
  name: autoinsight-secrets
  namespace: autoinsight
type: Opaque
stringData:
  DATABASE_URL: "postgresql://autoinsight:changeme@postgres:5432/autoinsight"
  REDIS_URL: "redis://redis:6379/0"
  JWT_SECRET: "change-this-in-production-with-a-secure-random-string"
  GROQ_API_KEY: ""
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoinsight-api
  namespace: autoinsight
  labels:
    app: autoinsight-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: autoinsight-api
  template:
    metadata:
      labels:
        app: autoinsight-api
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - name: api
        image: ghcr.io/autoinsight-ai/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: autoinsight-config
        - secretRef:
            name: autoinsight-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoinsight-worker
  namespace: autoinsight
  labels:
    app: autoinsight-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoinsight-worker
  template:
    metadata:
      labels:
        app: autoinsight-worker
    spec:
      containers:
      - name: worker
        image: ghcr.io/autoinsight-ai/worker:latest
        imagePullPolicy: Always
        command: ["celery", "-A", "backend.tasks", "worker", "--loglevel=warning", "--concurrency=8"]
        envFrom:
        - configMapRef:
            name: autoinsight-config
        - secretRef:
            name: autoinsight-secrets
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoinsight-frontend
  namespace: autoinsight
  labels:
    app: autoinsight-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoinsight-frontend
  template:
    metadata:
      labels:
        app: autoinsight-frontend
    spec:
      containers:
      - name: frontend
        image: nginx:alpine
        ports:
        - containerPort: 80
          protocol: TCP
        volumeMounts:
        - name: frontend-static
          mountPath: /usr/share/nginx/html
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
          readOnly: true
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
      volumes:
      - name: frontend-static
        emptyDir: {}
      - name: nginx-config
        configMap:
          name: autoinsight-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: autoinsight-api
  namespace: autoinsight
  labels:
    app: autoinsight-api
spec:
  type: ClusterIP
  selector:
    app: autoinsight-api
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: autoinsight-frontend
  namespace: autoinsight
  labels:
    app: autoinsight-frontend
spec:
  type: ClusterIP
  selector:
    app: autoinsight-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autoinsight-ingress
  namespace: autoinsight
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - autoinsight.example.com
    secretName: autoinsight-tls
  rules:
  - host: autoinsight.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: autoinsight-frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: autoinsight-api
            port:
              number: 8000
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: autoinsight-api
            port:
              number: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autoinsight-api-hpa
  namespace: autoinsight
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autoinsight-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: autoinsight-api-pdb
  namespace: autoinsight
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: autoinsight-api
