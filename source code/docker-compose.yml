# =============================================================================
# AutoInsight AI — Docker Compose
# Phase 1: Foundation — Local Development Infrastructure with Convex & Groq
# =============================================================================
# Services:
#   api        - FastAPI backend with auto-reload
#   worker     - Celery async task worker
#   redis      - Redis 7 cache + task queue
# =============================================================================

version: "3.8"

services:
  # ===========================================================================
  # FastAPI Backend
  # ===========================================================================
  api:
    build:
      context: .
      target: development
    container_name: autoinsight-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - api_data:/app/uploads
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - autoinsight-net

  # ===========================================================================
  # Celery Async Worker
  # ===========================================================================
  worker:
    build:
      context: .
      target: development
    container_name: autoinsight-worker
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    command: celery -A backend.tasks worker --loglevel=info --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - autoinsight-net

  # ===========================================================================
  # Redis 7 — Cache + Task Queue Backend
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: autoinsight-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - autoinsight-net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  redis_data:
    driver: local
  api_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  autoinsight-net:
    driver: bridge
